<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Icons -->

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">

        <!-- Header -->

        <div class="header">
            <h1>
                🌍 AI Language Translator
            </h1>
           <p>
                Translate Text Instantly
            </p>
        </div>

        <!-- Dark Mode -->

        <div class="top-buttons">
           <button id="themeBtn">
               🌙 Dark Mode
            </button>
        </div>

        <!-- Input -->

        <div class="card">
            <label>
                Enter Text
            </label>
            <textarea id="inputText" placeholder="Type something..."></textarea>
        </div>

        <!-- Language Selection -->

        <div class="language-box">
            <div>
                <label>
                    From
                </label>
                <select id="sourceLang">
                    <option value="en">
                        English
                    </option>
                    <option value="ur">
                        Urdu
                    </option>
                    <option value="hi">
                        Hindi
                    </option>
                    <option value="fr">
                        French
                    </option>
                    <option value="es">
                        Spanish
                    </option>
                    <option value="ar">
                        Arabic
                    </option>
                </select>
            </div>
            <button id="swapBtn">
                🔄
            </button>
            <div>
                <label>
                    To
                </label>
                <select id="targetLang">
                    <option value="ur">
                        Urdu
                    </option>
                    <option value="en">
                        English
                    </option>
                    <option value="hi">
                        Hindi
                    </option>
                    <option value="fr">
                        French
                    </option>
                    <option value="es">
                        Spanish
                    </option>
                    <option value="ar">
                        Arabic
                    </option>
                </select>
            </div>
        </div>

        <!-- Translate -->

        <button class="translate-btn" id="translateBtn">
            Translate
        </button>

        <!-- Loading -->

        <div id="loading" class="loading">
            Translating...
        </div>

        <!-- Output -->

        <div class="card">
            <label>
                Translated Text
            </label>
            <textarea id="outputText" readonly placeholder="Translation appears here...">
</textarea>
        </div>

        <!-- Action Buttons -->

        <div class="actions">
            <button id="copyBtn">
                📋 Copy
            </button>
            <button id="speakBtn">
                🔊 Speak
            </button>
            <button id="voiceBtn">
                🎤 Voice Input
            </button>
        </div>

        <!-- Translation History -->
         
        <div class="history">
            <h2>
                Recent History
            </h2>
            <ul id="historyList">
            </ul>
            <button id="clearHistoryBtn">🗑 Clear History</button>
        </div>
    </div>
    <script src="script.js">
    </script>
</body>
</html>
